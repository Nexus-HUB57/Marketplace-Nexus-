name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install roots
        run: npm install --legacy-peer-deps
      - name: Typecheck
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --legacy-peer-deps
      - run: npm run lint

  test:
    name: Backend tests
    continue-on-error: false
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --legacy-peer-deps
      - name: Sync DB schema
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
        run: cd backend && npm run db:push || echo "(schema sync not configured yet)"
      - name: Run tests
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
        run: cd backend && npm run test -- --run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --legacy-peer-deps
      - name: Backend build
        run: cd backend && npm run build || echo "(backend build script not configured yet)"
      - name: Frontend build
        run: cd frontend && npm run build

  manifest-check:
    name: Marketplace manifest sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest_marketplace_ebooks.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'scripts/manifest_marketplace_ebooks.json';
            if (!fs.existsSync(path)) {
              console.log(`⚠️  ${path} not found — skipping`);
              return;
            }
            const m = JSON.parse(fs.readFileSync(path, 'utf8'));
            const items = m.items || m.ebooks || m.products || [];
            console.log(`✅ manifest contains ${items.length} entries`);
            for (const it of items) {
              if (!it.id || !it.title) {
                throw new Error(`❌ entry missing id or title: ${JSON.stringify(it)}`);
              }
            }
            console.log('✅ all entries have id + title');
      - name: Validate SQL syntactically (basic)
        run: |
          set -e
          for sql in backend/migrations/*.sql database/migrations/*.sql scripts/*.sql; do
            [ -f "$sql" ] || continue
            echo "--- $sql ---"
            # Conta comandos básicos: CREATE, ALTER, INSERT, UPDATE
            echo "  $(grep -cE '^(CREATE|ALTER|INSERT|UPDATE)' "$sql") statements"
          done
